# Docker Compose — Attestia stack
#
# LOCAL DEVELOPMENT / INTEGRATION TESTING ONLY.
# Not a production deployment manifest: attestia-node runs in unsecured mode
# by default (see below) and rippled runs in standalone mode with no peers.
#
# Services:
#   attestia-node  — REST API server (Phase 8)
#   rippled        — Standalone XRPL node for integration testing
#
# Usage:
#   docker compose up -d
#   curl http://localhost:3000/health
#   docker compose down

services:
  attestia-node:
    build:
      context: .
      dockerfile: packages/node/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: "info"
      NODE_ENV: "production"
      DEFAULT_CURRENCY: "USDC"
      DEFAULT_DECIMALS: "6"
      RATE_LIMIT_RPM: "100"
      RATE_LIMIT_BURST: "20"
      # Unsecured mode (no API_KEYS or JWT_SECRET) for local dev.
      # Set API_KEYS and/or JWT_SECRET to enable auth:
      # API_KEYS: "my-key:admin:default"
      # JWT_SECRET: "change-me-in-production"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  rippled:
    # Pinned to an immutable release (tag + digest) — never :latest.
    image: rippleci/rippled:2.3.1@sha256:bb471c7f0bc7362f873cdb83f8be1409b42a1b4a8b7e9c36ea4d6d20b78d2de7
    command: standalone
    ports:
      - "6006:6006"             # WebSocket (used by integration tests)
      - "127.0.0.1:5005:5005"   # JSON-RPC admin — localhost only, never all interfaces
    healthcheck:
      test: ["CMD", "rippled", "--silent", "server_info"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
