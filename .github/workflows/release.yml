name: Release

# Publishes the single bundled package @mcptoolshop/attestia (packages/attestia)
# to npm via OIDC Trusted Publishing (no long-lived token) with provenance, and
# creates a GitHub Release. The 14 internal @attestia/* packages stay private —
# they are inlined into the bundle at build time (tsup noExternal), so the
# published tarball has zero workspace deps.
#
# First real release: bump packages/attestia/package.json (and the root) to the
# next version, then `git tag vX.Y.Z && git push origin vX.Y.Z`. v2.0.0 is
# already tagged, so the first npm release is v2.0.1+.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # for GitHub Release creation
  id-token: write # for npm provenance via Sigstore OIDC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Publish @mcptoolshop/attestia to npm + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install npm >=11.5 in sandbox for OIDC trusted-publishing auth
        run: |
          # Node 22's bundled npm 10.9 breaks on an in-place 'npm i -g npm@latest'
          # (arborist race -> MODULE_NOT_FOUND: promise-retry). Install npm@latest
          # into a sandbox and shadow it on PATH; the system npm is untouched.
          SANDBOX="$HOME/.npm-cli-sandbox"
          mkdir -p "$SANDBOX"
          pushd "$SANDBOX" >/dev/null
          echo '{"name":"npm-cli-sandbox","version":"0.0.0","private":true}' > package.json
          npm install --no-save --no-audit --no-fund --silent npm@latest
          popd >/dev/null
          echo "$SANDBOX/node_modules/.bin" >> "$GITHUB_PATH"
          "$SANDBOX/node_modules/.bin/npm" --version

      - name: Verify tag matches packages/attestia/package.json version
        run: |
          PKG_VERSION=$(node -p "require('./packages/attestia/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: ${GITHUB_REF_NAME} -> ${TAG_VERSION}"
          echo "Package: ${PKG_VERSION}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match packages/attestia/package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (incl. the bundle)
        # Build BEFORE tests: cross-package tests import @attestia/* from each
        # package's built dist/, so the workspace must be built first (same
        # order as ci.yml). Running tests first fails with "Failed to resolve
        # entry for package @attestia/types".
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Strip workspace-only devDependencies from the published manifest
        working-directory: packages/attestia
        run: |
          # The @attestia/* deps are build-time only (inlined by tsup) and use the
          # pnpm `workspace:*` protocol, which npm cannot resolve. Consumers never
          # need them. Drop the whole devDependencies block so the published
          # manifest has only the real third-party `dependencies`.
          npm pkg delete devDependencies
          echo "Published dependencies:" && node -p "JSON.stringify(require('./package.json').dependencies, null, 2)"

      - name: npm pack dry-run (verify tarball shape)
        working-directory: packages/attestia
        run: npm pack --dry-run

      - name: Publish to npm with provenance (OIDC trusted publisher)
        working-directory: packages/attestia
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "@mcptoolshop/attestia ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
