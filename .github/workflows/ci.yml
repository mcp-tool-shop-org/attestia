name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Dependency vulnerability scan
        if: matrix.node-version == 22
        # Fail the build on any high/critical advisory in PRODUCTION deps (the
        # shipped artifact). Dev-only test-tooling advisories (e.g. vitest's
        # transitive minimatch/rollup) do not ship and must not block CI.
        # Tolerate registry/network outages so a flaky endpoint can't block CI.
        run: |
          set +e
          audit_out="$(pnpm audit --prod --audit-level=high 2>&1)"
          status=$?
          echo "$audit_out"
          if [ "$status" -eq 0 ]; then
            echo "No high or critical vulnerabilities found."
            exit 0
          fi
          if echo "$audit_out" | grep -qiE 'vulnerabilit'; then
            echo "::error::High or critical dependency vulnerabilities detected."
            exit 1
          fi
          echo "::warning::pnpm audit could not reach the advisory registry; treating as non-blocking."
          exit 0

      - name: Run benchmarks
        if: matrix.node-version == 22
        run: pnpm bench

      - name: Upload coverage to Codecov
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          directory: .
          flags: unit
          fail_ci_if_error: false
