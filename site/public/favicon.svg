<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Attestia">
  <title>Attestia</title>
  <!-- Brand: emerald attestation mark on near-black, matching the site palette
       (--color accent #34d399 / surface #09090b). A stylized "A" whose crossbar
       is an attestation check — "humans approve; machines verify". -->
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#09090b"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#27272a" stroke-width="1"/>
  <!-- The "A": two legs -->
  <path d="M20 47 L32 17 L44 47" fill="none" stroke="url(#a)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crossbar rendered as an attestation checkmark -->
  <path d="M24.5 37 L30 42.5 L41 28.5" fill="none" stroke="#fafafa" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
