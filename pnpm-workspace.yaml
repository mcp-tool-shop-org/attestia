# minimatch/rollup patch dev-tooling advisories.
overrides:
  "minimatch@<3.1.4": "^3.1.4"
  "rollup@<4.59.0": "^4.59.0"
  "bn.js": "5.2.3"
  "ws": "^8.21.0"
